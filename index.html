<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旧件核对分箱 V10</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --ios-blue: #007aff; --ios-green: #34c759; --ios-red: #ff3b30; --ios-orange: #ff9500; --safe-top: env(safe-area-inset-top); }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: calc(var(--safe-top) + 10px) 16px 220px 16px; }
        .card { background: #fff; border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-blue { background: var(--ios-blue); color: #fff; width: 100%; }
        .btn-red { background: var(--ios-red); color: #fff; width: 100%; }
        .btn-green { background: var(--ios-green); color: #fff; width: 100%; font-size: 16px; height: 50px; }
        .btn-outline { background: #fff; border: 1px solid var(--ios-blue); color: var(--ios-blue); padding: 6px 12px; border-radius: 8px; font-size: 12px; }
        
        .box-control { display: flex; align-items: center; gap: 10px; background: #f0f0f5; padding: 8px 12px; border-radius: 10px; }
        .box-input { width: 55px; padding: 6px; border: 1px solid #ddd; border-radius: 6px; text-align: center; font-weight: bold; font-size: 16px; color: var(--ios-blue); }

        .filter-input { width: 100%; border: 1px solid #d1d1d6; border-radius: 10px; padding: 12px; margin-top: 10px; box-sizing: border-box; font-size: 15px; background: #fff; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; min-height: 200px; position: relative; }
        #reader-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; font-size: 14px; text-align: center; width: 100%; }
        
        .list-item { padding: 12px; border-bottom: 0.5px solid #eee; position: relative; display: flex; flex-direction: column; gap: 6px; }
        .list-item.in-box { border-left: 6px solid var(--ios-green); background: #fafff9; }
        
        .tag-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #eee; color: #444; font-weight: 500; }
        .tag-blue { background: #e5f1ff; color: #007aff; }
        .qty-badge { background: var(--ios-orange); color: white; border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; box-shadow: 0 2px 4px rgba(255,149,0,0.3); }

        .info-block { background: #f8f8f8; padding: 10px; border-radius: 8px; margin-top: 2px; border: 0.5px solid #efefef; }
        .data-row { display: flex; margin-bottom: 5px; font-size: 12px; }
        .data-label { color: #888; width: 85px; flex-shrink: 0; }
        .data-value { color: #1a1a1a; word-break: break-all; font-family: monospace; font-weight: 600; }

        .box-badge { position: absolute; right: 12px; top: 12px; background: var(--ios-green); color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; box-shadow: 0 2px 5px rgba(52,199,89,0.3); }

        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: white; padding: 16px 24px; border-radius: 12px; z-index: 9999; display: none; text-align: center; width: 70%; line-height: 1.5; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 15px 20px calc(var(--safe-bottom) + 15px); background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); border-top: 0.5px solid #ccc; z-index: 1000; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 style="margin:0;">📂 1. 数据导入</h3>
        <button onclick="resetSystem()" style="font-size:11px; color:var(--ios-red); border:none; background:none; font-weight:bold;">清空重置</button>
    </div>
    <input type="file" id="excelInput" accept=".xlsx, .xls, .csv" style="display: none;">
    <button class="btn btn-blue" onclick="document.getElementById('excelInput').click()" style="margin-top:10px;">选择《待回运旧件清单》</button>
    <div id="statusLog" style="text-align:center; font-size:12px; color:#999; margin-top:8px;">等待导入数据...</div>
</div>

<div class="card">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3 style="margin:0;">📦 2. 装箱操作</h3>
        <div class="box-control">
            <span>当前箱号:</span>
            <input type="number" id="boxNumber" class="box-input" value="1" min="1">
        </div>
    </div>
    <div id="reader"><div id="reader-status">相机未启动</div></div>
    <button id="camBtn" class="btn btn-blue" style="margin-top:15px; display:none;">开启扫码相机</button>
</div>

<div class="card" style="padding: 10px 0;">
    <div style="padding: 0 15px;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">📋 3. 核对明细</h3>
            <b id="statText" style="color:var(--ios-blue); font-size:18px;">0 / 0</b>
        </div>
        <input type="text" id="filterInput" class="filter-input" placeholder="🔍 搜索 品牌/VIN/编码/条码/名称...">
    </div>
    <div id="itemList" style="margin-top: 10px; max-height: 380px; overflow-y: auto;">
        <p style="text-align: center; color: #ccc; padding: 30px;">等待上传清单...</p>
    </div>
</div>

<div class="footer">
    <button class="btn btn-green" onclick="exportToTemplate()">💾 导出《旧件信息清单导入模板》</button>
</div>

<audio id="beepAudio" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<script>
    let inventory = JSON.parse(localStorage.getItem('v10_inv')) || [];
    let boxData = JSON.parse(localStorage.getItem('v10_box')) || {}; 
    let html5QrCode = null;
    let isProcessing = false;
    let cameraActive = false;
    const beep = document.getElementById('beepAudio');

    window.onload = () => {
        if(inventory.length > 0) {
            document.getElementById('statusLog').innerText = `✅ 已载入 ${inventory.length} 条记录`;
            document.getElementById('camBtn').style.display = 'flex';
            renderList();
        }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; isProcessing = false; }, 2000);
    }

    function resetSystem() {
        if(confirm("确定要清空清单和装箱记录吗？")) {
            localStorage.clear();
            location.reload();
        }
    }

    // 数据导入 (映射字段)
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            const findK = (row, keys) => Object.keys(row).find(k => keys.some(s => k.includes(s)));

            inventory = json.map(row => ({
                orderNo: String(row[findK(row, ["保修单号"])] || ''),
                partNo: String(row[findK(row, ["旧件编号", "零件号", "旧件编码"])] || ''),
                name: String(row[findK(row, ["旧件名称", "名称"])] || ''),
                barcode: String(row[findK(row, ["旧件条码", "条码"])] || '').trim(),
                vin: String(row[findK(row, ["VIN", "车架号"])] || ''),
                brand: String(row[findK(row, ["品牌"])] || '-'),
                qty: row[findK(row, ["数量"])] || 1,
                repairNo: String(row[findK(row, ["维修编号", "工单"])] || ''),
                model: String(row[findK(row, ["车型"])] || ''),
                original: row
            })).filter(i => i.barcode !== '');
            
            localStorage.setItem('v10_inv', JSON.stringify(inventory));
            document.getElementById('statusLog').innerText = `✅ 成功导入 ${inventory.length} 条数据`;
            renderList();
            document.getElementById('camBtn').style.display = 'flex';
        };
        reader.readAsArrayBuffer(file);
    });

    // 相机智控逻辑
    async function stopScanner() {
        if (html5QrCode) {
            try {
                if(html5QrCode.isScanning) await html5QrCode.stop();
                await html5QrCode.clear(); 
            } catch (e) { console.error(e); }
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            stream.getTracks().forEach(track => track.stop());
        } catch (e) {}
        html5QrCode = null;
        document.getElementById('reader').innerHTML = '<div id="reader-status">相机已安全关闭</div>';
    }

    document.getElementById('camBtn').addEventListener('click', async function() {
        const btn = this;
        if(!cameraActive) {
            btn.disabled = true;
            btn.innerText = "⏳ 启动硬件中...";
            await stopScanner();
            await new Promise(r => setTimeout(r, 400));
            beep.play().then(() => beep.pause()).catch(() => {});
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 25, qrbox: { width: 250, height: 180 } }, 
                    (code) => { if(!isProcessing) handleSelection(code.trim()); }
                );
                cameraActive = true;
                btn.innerText = "🛑 暂停相机";
                btn.className = "btn btn-red";
            } catch (err) {
                showToast("无法开启相机，请检查权限");
                btn.innerText = "开启扫码相机";
            } finally { btn.disabled = false; }
        } else {
            btn.disabled = true;
            btn.innerText = "正在安全释放...";
            await stopScanner();
            cameraActive = false;
            btn.innerText = "📷 开启扫码相机";
            btn.className = "btn btn-blue";
            btn.disabled = false;
        }
    });

    function handleSelection(barcode) {
        const item = inventory.find(i => i.barcode === barcode);
        if(!item) { isProcessing = true; showToast("❌ 条码不在清单中\n" + barcode); return; }
        if(boxData[barcode]) { isProcessing = true; showToast(`⚠️ 已装箱：第 ${boxData[barcode].boxId} 箱`); return; }

        isProcessing = true;
        const currentBox = document.getElementById('boxNumber').value || "1";
        boxData[barcode] = { boxId: currentBox };
        localStorage.setItem('v10_box', JSON.stringify(boxData));
        
        beep.currentTime = 0;
        beep.play().catch(()=>{});
        if (navigator.vibrate) navigator.vibrate(80);

        renderList(document.getElementById('filterInput').value.toUpperCase());
        setTimeout(() => { isProcessing = false; }, 1200);
    }

    function renderList(filter = '') {
        const listDiv = document.getElementById('itemList');
        listDiv.innerHTML = '';
        const f = filter.toUpperCase();
        
        const filtered = inventory.filter(i => 
            i.brand.toUpperCase().includes(f) ||
            i.vin.toUpperCase().includes(f) || 
            i.partNo.toUpperCase().includes(f) || 
            i.barcode.toUpperCase().includes(f) ||
            i.name.includes(f)
        );
        
        document.getElementById('statText').innerText = `${Object.keys(boxData).length} / ${inventory.length}`;

        filtered.forEach(item => {
            const inBox = boxData[item.barcode];
            const div = document.createElement('div');
            div.className = `list-item ${inBox ? 'in-box' : ''}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div style="font-weight:bold; font-size:16px; color:#1c1c1e;">${item.name}</div>
                    <div class="qty-badge" title="数量">${item.qty}</div>
                </div>
                <div class="tag-row">
                    <span class="tag tag-blue">${item.brand}</span>
                    <span class="tag">VIN末位: ${item.vin.slice(-6)}</span>
                </div>
                <div class="info-block">
                    <div class="data-row"><span class="data-label">旧件编码:</span><span class="data-value">${item.partNo}</span></div>
                    <div class="data-row"><span class="data-label">旧件条码:</span><span class="data-value">${item.barcode}</span></div>
                    <div class="data-row"><span class="data-label">VIN全号:</span><span class="data-value">${item.vin}</span></div>
                </div>
                ${inBox ? `<div class="box-badge">第 ${inBox.boxId} 箱</div>` : ''}
                <div style="margin-top:10px;">
                    ${inBox ? 
                        `<button class="btn-outline" style="color:var(--ios-red); border-color:var(--ios-red);" onclick="removeItem('${item.barcode}')">移出箱子</button>` : 
                        `<button class="btn-outline" onclick="handleSelection('${item.barcode}')">确认装箱</button>`
                    }
                </div>
            `;
            if(inBox) listDiv.prepend(div); else listDiv.appendChild(div);
        });
    }

    window.removeItem = (bc) => { 
        delete boxData[bc]; 
        localStorage.setItem('v10_box', JSON.stringify(boxData));
        renderList(document.getElementById('filterInput').value.toUpperCase()); 
    };

    document.getElementById('filterInput').addEventListener('input', (e) => renderList(e.target.value));

    // 导出 (固定模板格式)
    function exportToTemplate() {
        const packedBarcodes = Object.keys(boxData);
        if(packedBarcodes.length === 0) return alert("请先装箱再导出");

        const templateData = packedBarcodes.map(bc => {
            const item = inventory.find(i => i.barcode === bc);
            return {
                "箱号": boxData[bc].boxId,
                "保修单号(必填)": item.orderNo,
                "旧件编号(必填)": item.partNo,
                "旧件名称": item.name,
                "旧件条码(必填)": item.barcode,
                "工单编号": item.repairNo || "",
                "旧件数量(必填)": item.qty,
                "VIN": item.vin,
                "品牌": item.brand,
                "车型": item.model || ""
            };
        });

        const ws = XLSX.utils.json_to_sheet(templateData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "导入模板");
        XLSX.writeFile(wb, `旧件分箱导入模板_${new Date().getTime()}.xlsx`);
    }
</script>
</body>
</html>
