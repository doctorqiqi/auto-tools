<script>
    // 1. 初始化数据：优先从本地存储恢复，防止数据被清除
    window.inventory = JSON.parse(localStorage.getItem('old_parts_inv')) || [];
    window.boxRecords = JSON.parse(localStorage.getItem('old_parts_box')) || {}; 
    
    let html5QrCode = null; 
    let isProcessing = false;
    const beep = document.getElementById('beepAudio');

    // 页面加载时自动渲染一次，确保数据可见
    window.onload = () => {
        if(window.inventory.length > 0) {
            document.getElementById('dataCount').innerText = `已载入 ${window.inventory.length} 条`;
            document.getElementById('camBtn').style.display = 'flex';
            renderList();
        }
    };

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; isProcessing = false; }, 2000);
    }

    // 保存到本地存储
    function saveData() {
        localStorage.setItem('old_parts_inv', JSON.stringify(window.inventory));
        localStorage.setItem('old_parts_box', JSON.stringify(window.boxRecords));
    }

    // 导入逻辑
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const workbook = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
            const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            
            window.inventory = json.map(row => ({
                orderNo: String(row["保修单号"] || ''),
                partNo: String(row["旧件编号"] || ''),
                name: String(row["旧件名称"] || ''),
                barcode: String(row["旧件条码"] || '').trim(),
                vin: String(row["VIN"] || ''),
                qty: row["数量"] || 1
            }));
            
            saveData();
            document.getElementById('dataCount').innerText = `已载入 ${window.inventory.length} 条`;
            document.getElementById('reader-status').innerText = "相机就绪";
            document.getElementById('camBtn').style.display = 'flex';
            renderList();
        };
        reader.readAsArrayBuffer(file);
    });

    // 2. 核心改进：相机的彻底销毁与重建
    document.getElementById('camBtn').addEventListener('click', async function() {
        const btn = this;
        
        if (btn.innerText.includes("开启")) {
            // 每次开启都重新创建一个全新的实例，防止之前的状态挂死
            if (html5QrCode) {
                try { await html5QrCode.clear(); } catch(e) {}
            }
            html5QrCode = new Html5Qrcode("reader");

            // 激活音频
            beep.play().then(() => beep.pause()).catch(() => {});
            
            try {
                btn.disabled = true;
                btn.innerText = "⏳ 唤醒相机...";
                
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: { width: 250, height: 200 } }, 
                    (code) => { if(!isProcessing) handleScanSuccess(code.trim()); }
                );
                
                document.getElementById('reader-status').style.display = 'none';
                btn.innerText = "🛑 关闭并保存进度";
                btn.style.background = "#ff3b30";
                btn.disabled = false;
            } catch (err) {
                showToast("启动失败：请检查摄像头权限");
                btn.innerText = "📷 开启相机";
                btn.disabled = false;
            }
        } else {
            // 关闭相机流程：彻底释放硬件并置空实例
            try {
                btn.disabled = true;
                btn.innerText = "☁️ 释放硬件中...";
                
                if (html5QrCode) {
                    await html5QrCode.stop();
                    await html5QrCode.clear(); 
                    html5QrCode = null; // 关键：必须置空
                }
                
                document.getElementById('reader-status').style.display = 'block';
                document.getElementById('reader-status').innerText = "相机已关闭";
                btn.innerText = "📷 开启相机";
                btn.style.background = "var(--ios-blue)";
                btn.disabled = false;
                
                renderList(document.getElementById('filterInput').value.toUpperCase());
            } catch (err) {
                // 如果正常 stop 失败，强制清理
                html5QrCode = null;
                location.reload(); // 作为最后的兜底手段，如果是硬件死锁，刷新页面
            }
        }
    });

    function handleScanSuccess(barcode) {
        const item = window.inventory.find(i => i.barcode === barcode);
        if(!item) { 
            isProcessing = true; 
            showToast("❌ 错误：条码不在清单内"); 
            return; 
        }
        if(window.boxRecords[barcode]) { 
            isProcessing = true; 
            showToast(`⚠️ 已在第 ${window.boxRecords[barcode]} 箱`); 
            return; 
        }

        const currentBox = document.getElementById('boxNumber').value;
        window.boxRecords[barcode] = currentBox;
        saveData(); // 实时保存进度
        
        beep.currentTime = 0;
        beep.play().catch(() => {});
        if (navigator.vibrate) navigator.vibrate(80);

        renderList(document.getElementById('filterInput').value.toUpperCase());
    }

    function renderList(filter = '') {
        const listDiv = document.getElementById('itemList');
        if (!listDiv) return;
        listDiv.innerHTML = '';
        
        const inv = window.inventory || [];
        const rec = window.boxRecords || {};

        const filtered = inv.filter(i => 
            i.orderNo.toUpperCase().includes(filter) || 
            i.barcode.toUpperCase().includes(filter) ||
            i.vin.toUpperCase().includes(filter) ||
            i.name.includes(filter)
        );
        
        document.getElementById('statText').innerText = `${Object.keys(rec).length} / ${inv.length}`;

        filtered.forEach(item => {
            const boxNum = rec[item.barcode];
            const div = document.createElement('div');
            div.className = `list-item ${boxNum ? 'in-box' : ''}`;
            div.innerHTML = `
                <div style="font-weight:bold;">${item.name}</div>
                <div class="info-block">
                    <div class="data-row"><span class="data-label">单号:</span><span class="data-value">${item.orderNo}</span></div>
                    <div class="data-row"><span class="data-label">条码:</span><span class="data-value">${item.barcode}</span></div>
                </div>
                ${boxNum ? `<div class="box-badge">第 ${boxNum} 箱</div>` : ''}
                <div style="margin-top:8px;">
                    ${boxNum ? 
                        `<button class="btn-outline" onclick="removeItem('${item.barcode}')">移出</button>` : 
                        `<button class="btn-outline" onclick="handleScanSuccess('${item.barcode}')">手动确认</button>`
                    }
                </div>
            `;
            if(boxNum) listDiv.prepend(div); else listDiv.appendChild(div);
        });
    }

    window.removeItem = (bc) => { 
        delete window.boxRecords[bc]; 
        saveData();
        renderList(document.getElementById('filterInput').value.toUpperCase()); 
    };

    document.getElementById('filterInput').addEventListener('input', (e) => renderList(e.target.value.toUpperCase()));

    function exportToTemplate() {
        const rec = window.boxRecords || {};
        const barcodes = Object.keys(rec);
        if(barcodes.length === 0) return alert("无扫码记录");
        
        const data = barcodes.map(bc => {
            const item = window.inventory.find(i => i.barcode === bc);
            return {
                "箱号": rec[bc],
                "保修单号(必填)": item.orderNo,
                "旧件条码(必填)": item.barcode,
                "旧件名称": item.name,
                "VIN": item.vin,
                "数量": item.qty
            };
        });
        
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "装箱清单");
        XLSX.writeFile(wb, `分箱结果_${new Date().toLocaleDateString()}.xlsx`);
    }
</script>
