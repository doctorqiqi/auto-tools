<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>旧件核对 V8-全字段筛选版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --ios-blue: #007aff; --ios-green: #34c759; --ios-red: #ff3b30; }
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; margin: 0; padding: 10px 16px 160px 16px; }
        .card { background: #fff; border-radius: 16px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 12px; }
        .btn-main { background: var(--ios-blue); color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-stop { background: var(--ios-red) !important; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-top: 10px; min-height: 200px; position: relative; }
        #reader-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #666; text-align: center; width: 100%; }
        
        /* 列表样式优化 */
        .list-item { padding: 12px; border-bottom: 0.5px solid #eee; transition: 0.3s; }
        .list-item.scanned { background: #f2faf3; border-left: 5px solid var(--ios-green); }
        .item-title { font-weight: bold; font-size: 15px; color: #1c1c1e; margin-bottom: 4px; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #f0f0f2; color: #666; }
        .tag-blue { background: #e5f1ff; color: var(--ios-blue); }
        .info-detail { font-size: 11px; color: #8e8e93; font-family: monospace; }
        
        #toast { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.85); color: #fff; padding: 16px 24px; border-radius: 12px; z-index: 9999; display: none; text-align: center; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-top: 0.5px solid #ddd; z-index: 100; }
        .stats { font-size: 20px; color: var(--ios-blue); font-weight: bold; }
        .filter-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #d1d1d6; box-sizing: border-box; background: #fff; font-size: 14px; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="card">
    <h3>📂 1. 清单导入</h3>
    <input type="file" id="excelInput" accept=".xlsx, .xls" style="display: none;">
    <button class="btn-main" onclick="document.getElementById('excelInput').click()">📁 选择 Excel 清单</button>
    <div id="importMsg" style="text-align:center; font-size:12px; color:#8e8e93; margin-top:8px;">未加载数据</div>
</div>

<div class="card">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3>📷 2. 扫码核对</h3>
        <span id="statText" class="stats">0 / 0</span>
    </div>
    <div id="reader">
        <div id="reader-status">📷 相机已关闭</div>
    </div>
    <button id="camBtn" class="btn-main" style="margin-top: 15px; display: none;">📷 启动相机</button>
</div>

<div class="card">
    <h3>📋 3. 核对明细</h3>
    <input type="text" id="filterInput" class="filter-input" placeholder="🔍 搜索 品牌/VIN/编号/条码/名称...">
    <div id="itemList" style="margin-top: 10px; max-height: 350px; overflow-y: auto;">
        <p style="text-align: center; color: #999; padding: 20px;">等待导入数据...</p>
    </div>
</div>

<div class="footer">
    <button class="btn-main" style="background: var(--ios-green);" onclick="exportResults()">💾 导出核对结果</button>
</div>

<audio id="beep" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg">
</audio>

<script>
    let inventory = [];
    let scanHistory = JSON.parse(localStorage.getItem('v8_scanHistory')) || {}; 
    let html5QrCode = null;
    let isProcessing = false;
    let cameraActive = false;

    const beep = document.getElementById('beep');
    const camBtn = document.getElementById('camBtn');
    const readerStatus = document.getElementById('reader-status');

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; isProcessing = false; }, 2000);
    }

    // --- 数据导入 ---
    document.getElementById('excelInput').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                
                // 自动匹配表头映射
                const findK = (row, keys) => Object.keys(row).find(k => keys.some(s => k.includes(s)));

                inventory = json.map(row => ({
                    barcode: String(row[findK(row, ['条码', '旧件条码'])] || '').trim(),
                    name: String(row[findK(row, ['名称', '旧件名称'])] || '未知'),
                    vin: String(row[findK(row, ['VIN', '车架号'])] || '-').trim(),
                    partNo: String(row[findK(row, ['编号', '旧件编号', '零件号'])] || '-').trim(),
                    brand: String(row[findK(row, ['品牌'])] || '-'),
                    qty: row[findK(row, ['数量'])] || 1,
                    raw: row
                })).filter(i => i.barcode !== '');

                document.getElementById('importMsg').innerText = `✅ 已加载 ${inventory.length} 条数据`;
                camBtn.style.display = 'flex';
                renderList();
                showToast("导入成功");
            } catch (err) {
                alert("表格解析失败，请检查格式");
            }
        };
        reader.readAsArrayBuffer(e.target.files[0]);
    });

    // --- 相机逻辑 ---
    camBtn.addEventListener('click', async function() {
        if (!cameraActive) {
            camBtn.disabled = true;
            camBtn.innerText = "⏳ 启动中...";
            if (html5QrCode) { await html5QrCode.clear(); }
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: { width: 250, height: 180 } }, 
                    (code) => { if (!isProcessing) handleScan(code.trim()); }
                );
                cameraActive = true;
                camBtn.innerText = "🛑 暂停扫码 (关闭相机)";
                camBtn.classList.add('btn-stop');
                readerStatus.style.display = 'none';
            } catch (err) {
                alert("无法访问相机，请确保已授权");
                camBtn.innerText = "📷 启动相机";
            } finally {
                camBtn.disabled = false;
            }
        } else {
            camBtn.disabled = true;
            camBtn.innerText = "正在释放硬件...";
            if (html5QrCode) {
                await html5QrCode.stop();
                await html5QrCode.clear();
                html5QrCode = null;
            }
            cameraActive = false;
            camBtn.innerText = "📷 启动相机";
            camBtn.classList.remove('btn-stop');
            readerStatus.style.display = 'block';
            camBtn.disabled = false;
        }
    });

    function handleScan(code) {
        const item = inventory.find(i => i.barcode === code);
        if (!item) {
            isProcessing = true;
            showToast(`❌ 未匹配到条码\n${code}`);
            return;
        }
        if (scanHistory[code]) {
            isProcessing = true;
            showToast(`⚠️ 重复扫码\n${item.name}`);
            return;
        }

        isProcessing = true;
        beep.play().catch(()=>{});
        if (navigator.vibrate) navigator.vibrate(80);
        
        scanHistory[code] = new Date().toLocaleString();
        localStorage.setItem('v8_scanHistory', JSON.stringify(scanHistory));
        
        renderList(document.getElementById('filterInput').value);
        setTimeout(() => { isProcessing = false; }, 1200);
    }

    // --- 列表渲染 (全字段支持) ---
    function renderList(filter = '') {
        const listDiv = document.getElementById('itemList');
        listDiv.innerHTML = '';
        const f = filter.toUpperCase();

        const filtered = inventory.filter(i => 
            i.barcode.toUpperCase().includes(f) || 
            i.name.includes(f) || 
            i.vin.toUpperCase().includes(f) ||
            i.brand.toUpperCase().includes(f) ||
            i.partNo.toUpperCase().includes(f)
        );

        document.getElementById('statText').innerText = `${Object.keys(scanHistory).length} / ${inventory.length}`;

        filtered.forEach(item => {
            const isScanned = !!scanHistory[item.barcode];
            const div = document.createElement('div');
            div.className = `list-item ${isScanned ? 'scanned' : ''}`;
            div.innerHTML = `
                <div class="item-title">${item.name}</div>
                <div class="tag-group">
                    <span class="tag tag-blue">${item.brand}</span>
                    <span class="tag">数量: ${item.qty}</span>
                    <span class="tag">VIN: ${item.vin}</span>
                </div>
                <div class="info-detail">编号: ${item.partNo}</div>
                <div class="info-detail">条码: ${item.barcode}</div>
                ${isScanned ? `<div style="color:var(--ios-green); font-size:10px; margin-top:4px;">✅ 已核对: ${scanHistory[item.barcode]}</div>` : ''}
            `;
            if (isScanned) listDiv.prepend(div); else listDiv.appendChild(div);
        });
        
        if(filtered.length === 0) listDiv.innerHTML = '<p style="text-align:center; color:#ccc; padding:20px;">未找到匹配项</p>';
    }

    document.getElementById('filterInput').addEventListener('input', (e) => renderList(e.target.value));

    // --- 导出结果 ---
    function exportResults() {
        if (inventory.length === 0) return alert("请先导入清单");
        const data = inventory.map(i => ({
            ...i.raw,
            '核对结果': scanHistory[i.barcode] ? '已核对' : '待核对',
            '核对时间': scanHistory[i.barcode] || '-'
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "核对报表");
        XLSX.writeFile(wb, `旧件核对结果_${new Date().getTime()}.xlsx`);
    }
</script>
</body>
</html>
